# Learning Rate
lr_encoders: 1e-6
lr_others: 5e-6

# Training Parameters
num_steps: 30000
warmup_ratio: 0.1
train_batch_size: 8
eval_every: 5000
do_eval: true

# Model Configuration
token_encoder: microsoft/deberta-v3-small
label_encoder: microsoft/deberta-v3-small
latent_dimension: 128
fine_tune: true
subtoken_pooling: first
hidden_size: 768
span_mode: marker
dropout: 0.4
freeze_token_rep: false

# Directory Paths
root_dir: /vol/tmp/goldejon/gliner
log_dir: vae_test_output
train_data: train_datasets/pilener_train.json
eval_data: eval_datasets/NER

# "none" if no pretrained model 
prev_path: none

# Training Specifics
dataloader:
  max_width: 12
  size_sup: -1
  max_types: 25
  shuffle_types: true
  random_drop: true
  max_neg_type_ratio: 1
  max_len: 384
  learn_only_positives: false

name: "vae"